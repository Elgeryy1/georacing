name: Node Services CI

on:
  push:
    paths:
      - "backend/**"
      - "discord-bot/**"
      - ".github/workflows/node-services.yml"
  pull_request:
    paths:
      - "backend/**"
      - "discord-bot/**"
      - ".github/workflows/node-services.yml"

jobs:
  backend:
    name: Backend (syntax + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Syntax check
        run: node --check server.js
      - name: Unit tests (node --test)
        run: npm test

  discord-bot:
    name: Discord bot (syntax + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: discord-bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: discord-bot/package-lock.json
      - name: Install dependencies
        run: npm ci
      # index.js is an ES module ("type": "module"). Copying to a .mjs file
      # forces the ESM parse goal for the syntax check.
      - name: Syntax check (ESM)
        run: |
          cp index.js "$RUNNER_TEMP/index.mjs"
          node --check "$RUNNER_TEMP/index.mjs"
      - name: Unit tests (node --test)
        run: npm test
