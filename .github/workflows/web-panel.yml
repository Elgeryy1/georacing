name: Web Panel CI

on:
  push:
    branches: [main]
    paths:
      - "web-panel/**"
      - ".github/workflows/web-panel.yml"
  pull_request:
    branches: [main]
    paths:
      - "web-panel/**"
      - ".github/workflows/web-panel.yml"

jobs:
  build:
    name: Typecheck + build (tsc && vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-panel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-panel/package-lock.json

      - name: Install dependencies
        run: npm ci

      # "build" runs `tsc && vite build`. The codebase typechecks clean under
      # strict mode, so type errors are build-blocking on purpose. VITE_* env
      # vars are not required at build time.
      - name: Build
        run: npm run build
