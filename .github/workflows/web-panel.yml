name: Web Panel CI

on:
  push:
    branches: [main]
    paths:
      - "web-panel/**"
      - ".github/workflows/web-panel.yml"
  pull_request:
    branches: [main]
    paths:
      - "web-panel/**"
      - ".github/workflows/web-panel.yml"

jobs:
  build:
    name: Build (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-panel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-panel/package-lock.json

      - name: Install dependencies
        run: npm ci

      # The package.json build script is "tsc && vite build". Type-checking is
      # run as a separate, non-blocking job below, so the build itself only
      # needs the bundler (esbuild ignores type errors). VITE_* env vars are
      # not required at build time: they simply end up undefined at runtime.
      - name: Build
        run: npx vite build

  typecheck:
    name: Type check (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: web-panel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-panel/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: tsc --noEmit
        run: npx tsc --noEmit
